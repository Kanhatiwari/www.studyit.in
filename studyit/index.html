<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STUDYIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <script>
      // Global Error Interceptor for specific browser bugs
      window.onerror = function(msg, url, line, col, error) {
        var stringMsg = msg ? msg.toLowerCase() : '';
        if (stringMsg.indexOf("illegal constructor") > -1) {
          console.warn("Suppressed 'Illegal constructor' error to prevent crash.");
          return true; 
        }
        return false;
      };

      // Robust Polyfill for process.env
      (function() {
        try {
          if (typeof window !== 'undefined') {
            if (!window.process) window.process = {};
            if (!window.process.env) window.process.env = {};
            if (!window.process.env.API_KEY) window.process.env.API_KEY = '';
          }
        } catch (e) {
          console.warn('Polyfill warning:', e);
        }
      })();
    </script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .perspective-1000 {
        perspective: 1000px;
      }
      .transform-style-3d {
        transform-style: preserve-3d;
      }
      .backface-hidden {
        backface-visibility: hidden;
      }
      .rotate-y-180 {
        transform: rotateY(180deg);
      }
      
      /* Logo Animations */
      @keyframes shine {
        0% { transform: translateX(-150%) skewX(12deg); }
        100% { transform: translateX(150%) skewX(12deg); }
      }
      .animate-shine {
        animation: shine 1.5s ease-in-out infinite;
      }
      @keyframes spin-slow {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .animate-spin-slow {
        animation: spin-slow 4s linear infinite;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/": "https://esm.sh/react@18.3.1/",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/": "https://esm.sh/react-dom@18.3.1/",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "@google/genai": "https://esm.sh/@google/genai@1.3.0",
    "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.3.1",
    "react-markdown": "https://esm.sh/react-markdown@9.0.1?deps=react@18.3.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-50 text-slate-900 overflow-hidden">
    <div id="root">
      <div style="height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #F8FAFC; color: #475569; font-family: sans-serif;">
        <div style="display: flex; flex-direction: column; align-items: center;">
          <div style="width: 48px; height: 48px; border: 4px solid #E2E8F0; border-top: 4px solid #4F46E5; border-radius: 50%; animation: spin 1s linear infinite;"></div>
          <p style="margin-top: 16px; font-weight: 600;">Loading STUDYIT...</p>
        </div>
        <style>
          @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        </style>
      </div>
    </div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
